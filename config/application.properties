server.port=8883

# MySQL database configuration
spring.datasource.url=jdbc:mysql://192.168.1.48:3306/minutes?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Wildfire IM admin server configuration
im.server.admin_url=http://localhost:18080
im.server.admin_secret=123456

# ASR WebSocket address
asr.ws.url=ws://192.168.1.81:12436

# Robot configuration
robot.im_id=robotminutes
robot.im_url=http://localhost
robot.im_secret=123456

# Janus IP替换映射配置，格式: 公网IP1:内网IP1,公网IP2:内网IP2
# 用于替换SDP中的公网IP为内网IP
janus.ip.replace.map=

# LLM configuration (OpenAI compatible API)
llm.api.url=https://api.moonshot.cn/v1/chat/completions
llm.api.key=sk-12345678
llm.api.model=kimi-k2-turbo-preview
llm.api.max-context-length=200000
